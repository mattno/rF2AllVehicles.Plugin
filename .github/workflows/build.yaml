name: Build SimHub Plugin

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Permissions are required for the Test Reporter to post results back to the PR
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: windows-latest # Required because SimHub plugins use Windows-specific .NET

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet Packages
      run: nuget restore rF2AllVehicles.Plugin.sln

    - name: Build Solution
      run: msbuild rF2AllVehicles.Plugin.sln /p:Configuration=Release

    - name: Run Tests
      # We use dotnet test to generate a .trx result file for the reporter
      run: |
        dotnet test rF2AllVehicles.Plugin.Tests\rF2AllVehicles.Plugin.Tests.csproj `
        --configuration Release `
        --no-build `
        --logger "trx;LogFileName=test-results.trx"

    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always() # Ensures reports are uploaded even if tests fail
      with:
        name: Unit Test Results
        path: "**/test-results.trx"
        reporter: dotnet-trx

    - name: Upload Artifact
      # Only runs if the build and tests actually passed
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: SimHub-Plugin-DLL
        path: rF2AllVehicles.Plugin/bin/Release/**/rF2AllVehicles.Plugin.dll