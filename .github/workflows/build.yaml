name: Build SimHub Plugin

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # This adds the manual "Play" button in GitHub

# Permissions are required for the Test Reporter to post results back to the PR
permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: windows-latest # Required because SimHub plugins use Windows-specific .NET

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch full history for better test reporting

    # 1. Determine Version (Only on Master)
    - name: Bump version and push tag
      id: tag_version
      if: |
        github.event_name == 'workflow_dispatch' || 
        (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch

    # 2. Update Directory.Build.props (Only on Master)
    # This ensures the DLL metadata matches the GitHub Release version
    - name: Update Version in Directory.Build.props
      if: |
        github.event_name == 'workflow_dispatch' || 
        (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
      shell: pwsh
      run: |
        $newVer = "${{ steps.tag_version.outputs.new_version }}"
        $propsPath = "Directory.Build.props"
        $content = Get-Content $propsPath
        # Regex looks for <Version>1.2.3</Version> and replaces the middle bit
        $content = $content -replace '<Version>.*</Version>', "<Version>$newVer</Version>"
        Set-Content $propsPath $content
        Write-Host "Updated $propsPath to version $newVer"


    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Restore NuGet Packages
      run: nuget restore rF2AllVehicles.Plugin.sln

    - name: Build Solution
      run: msbuild rF2AllVehicles.Plugin.sln /p:Configuration=Release

    - name: Run Tests
      # We use dotnet test to generate a .trx result file for the reporter
      run: |
        dotnet test rF2AllVehicles.Plugin.Tests\rF2AllVehicles.Plugin.Tests.csproj `
        --configuration Release `
        --no-build `
        --logger "trx;LogFileName=test-results.trx"

    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: always() # Ensures reports are uploaded even if tests fail
      with:
        name: Unit Test Results
        path: "**/test-results.trx"
        reporter: dotnet-trx

    - name: Create GitHub Release
      # Only release if we manually trigger it OR if the commit says [release]
      if: |
        github.event_name == 'workflow_dispatch' || 
        (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        name: Release ${{ steps.tag_version.outputs.new_tag }}
        files: rF2AllVehicles.Plugin/bin/Release/net48/rF2AllVehicles.Plugin.dll
        body: |
          Automatic build for version ${{ steps.tag_version.outputs.new_tag }}


    - name: Upload Artifact
      # Only runs if the build and tests actually passed
      if: success()
      uses: actions/upload-artifact@v4
      with:
        # Falls back to SHA if no new_tag is generated (like in PRs)
        name: SimHub-Plugin-${{ steps.tag_version.outputs.new_tag || github.sha }}
        path: rF2AllVehicles.Plugin/bin/Release/net48/rF2AllVehicles.Plugin.dll
